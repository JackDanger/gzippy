# =============================================================================
# Release: build binaries + .deb packages, publish GitHub release, update formula,
#          rebuild apt repository on GitHub Pages (jackdanger.github.io/gzippy)
# =============================================================================
# Triggered by version tags (v*) or manual dispatch.
# Produces:
#   - gzippy-{target}.tar.gz for 4 platforms
#   - gzippy_{version}_{arch}.deb for amd64 + arm64
#   - Updated Formula/gzippy.rb + Cargo.toml committed to main
#   - apt repo at https://jackdanger.github.io/gzippy (gh-pages branch)
#
# Required secret: APT_SIGNING_KEY — armored GPG private key (from 1Password)
# =============================================================================
name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0)'
        required: true

permissions:
  contents: write
  pages: write
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------------
  # Build native binaries for all 4 platforms
  # ---------------------------------------------------------------------------
  build-binary:
    name: Binary / ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
            apt_extras: ""
            features: ""
          - target: x86_64-apple-darwin
            runner: macos-latest
            apt_extras: ""
            features: ""
            cross_target: x86_64-apple-darwin
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            apt_extras: cmake
            features: ""
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            apt_extras: cmake nasm autoconf automake libtool
            features: --features isal-compression

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.cross_target }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: release-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Install build deps (Linux)
        if: runner.os == 'Linux' && matrix.apt_extras != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.apt_extras }}

      - name: Set version from tag
        run: |
          TAG="${{ github.event.inputs.tag }}"
          [ -z "$TAG" ] && TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          python3 -c "
          import re, sys
          version = sys.argv[1]
          content = open('Cargo.toml').read()
          content = re.sub(r'^version = \"[^\"]+\"', f'version = \"{version}\"', content, count=1, flags=re.M)
          open('Cargo.toml', 'w').write(content)
          print(f'Set Cargo.toml version to {version}')
          " "$VERSION"

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} ${{ matrix.features }}

      - name: Package tarball + SHA256
        run: |
          TARBALL="gzippy-${{ matrix.target }}.tar.gz"
          tar -czf "$TARBALL" -C target/${{ matrix.target }}/release gzippy
          shasum -a 256 "$TARBALL" | awk '{print $1}' > "$TARBALL.sha256"
          echo "Packaged $TARBALL ($(cat $TARBALL.sha256))"

      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: |
            gzippy-${{ matrix.target }}.tar.gz
            gzippy-${{ matrix.target }}.tar.gz.sha256

  # ---------------------------------------------------------------------------
  # Build Debian packages for amd64 + arm64
  # ---------------------------------------------------------------------------
  build-deb:
    name: Deb / ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: dtolnay/rust-toolchain@stable

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            debhelper devscripts build-essential \
            zlib1g-dev cmake nasm autoconf automake libtool

      - name: Set version from tag
        run: |
          TAG="${{ github.event.inputs.tag }}"
          [ -z "$TAG" ] && TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          DEB_VERSION="${VERSION}-1"
          sed -i "1s/gzippy ([^)]*)/gzippy ($DEB_VERSION)/" debian/changelog
          echo "debian/changelog version set to $DEB_VERSION"

      - name: Build Debian packages
        run: dpkg-buildpackage -us -uc -b -d

      - name: Smoke test installation
        run: |
          sudo dpkg -i ../gzippy_*.deb
          echo "Hello gzippy" | gzippy -c | gzippy -d
          echo "✓ gzippy package works"

      - name: Collect .deb files into workspace
        run: cp ../*.deb ./

      - uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.arch }}
          path: "*.deb"

  # ---------------------------------------------------------------------------
  # Publish: update formula, create GitHub release
  # ---------------------------------------------------------------------------
  release:
    name: Publish
    runs-on: ubuntu-latest
    needs: [build-binary, build-deb]

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Resolve version
        run: |
          TAG="${{ github.event.inputs.tag }}"
          [ -z "$TAG" ] && TAG="${{ github.ref_name }}"
          echo "RELEASE_TAG=$TAG" >> "$GITHUB_ENV"
          echo "VERSION=${TAG#v}" >> "$GITHUB_ENV"

      - name: Update Formula/gzippy.rb
        run: |
          python3 - <<'PYEOF'
          import os, re

          version = os.environ['VERSION']
          formula = open('Formula/gzippy.rb').read()

          # Update version string
          formula = re.sub(r'version "[^"]+"', f'version "{version}"', formula, count=1)

          # Update each sha256 sentinel: sha256 "..." # TARGET_KEY
          targets = {
              'AARCH64_APPLE_DARWIN':    'aarch64-apple-darwin',
              'X86_64_APPLE_DARWIN':     'x86_64-apple-darwin',
              'AARCH64_UNKNOWN_LINUX_GNU': 'aarch64-unknown-linux-gnu',
              'X86_64_UNKNOWN_LINUX_GNU':  'x86_64-unknown-linux-gnu',
          }
          for key, target in targets.items():
              tarball_path = f'dist/binary-{target}/gzippy-{target}.tar.gz.sha256'
              sha = open(tarball_path).read().strip()
              formula = re.sub(
                  rf'sha256 "[0-9a-f]+" # {key}',
                  f'sha256 "{sha}" # {key}',
                  formula,
              )

          open('Formula/gzippy.rb', 'w').write(formula)

          cargo_toml = open('Cargo.toml').read()
          cargo_toml = re.sub(r'^version = "[^"]+"', f'version = "{version}"', cargo_toml, count=1, flags=re.M)
          open('Cargo.toml', 'w').write(cargo_toml)

          print(f'Updated formula and Cargo.toml to v{version}')
          PYEOF

      - name: Commit updated formula
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/gzippy.rb Cargo.toml
          git diff --cached --quiet && echo "Nothing changed" && exit 0
          git commit -m "chore: update formula and version to v${VERSION} [skip ci]"
          git push origin HEAD:main || (git pull --rebase origin main && git push origin HEAD:main)

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/binary-*/gzippy-*.tar.gz
            dist/binary-*/gzippy-*.tar.gz.sha256
            dist/deb-amd64/*.deb
            dist/deb-arm64/gzippy_*_arm64.deb

      # -----------------------------------------------------------------------
      # Rebuild apt repository and deploy to GitHub Pages
      # -----------------------------------------------------------------------
      - name: Install reprepro
        run: sudo apt-get install -y reprepro

      - name: Import apt signing key
        env:
          APT_SIGNING_KEY: ${{ secrets.APT_SIGNING_KEY }}
        run: |
          echo "$APT_SIGNING_KEY" | gpg --batch --import
          KEY_FPR=$(gpg --list-keys --with-colons releases@jackdanger.com \
            | grep '^fpr' | head -1 | cut -d: -f10)
          echo "${KEY_FPR}:6:" | gpg --import-ownertrust
          echo "KEY_FPR=$KEY_FPR" >> "$GITHUB_ENV"

      - name: Build apt repository
        run: |
          DEB_VERSION="${VERSION}-1"
          mkdir -p apt-repo/conf

          cat > apt-repo/conf/distributions << EOF
          Origin: gzippy
          Label: gzippy
          Codename: stable
          Architectures: amd64 arm64
          Components: main
          Description: gzippy apt repository
          SignWith: ${KEY_FPR}
          EOF

          for deb in \
            dist/deb-amd64/gzippy_${DEB_VERSION}_amd64.deb \
            dist/deb-amd64/gzippy-replace-gzip_${DEB_VERSION}_all.deb \
            dist/deb-arm64/gzippy_${DEB_VERSION}_arm64.deb; do
            reprepro -b apt-repo includedeb stable "$deb"
          done

          # Public key + install script for the web root
          cp apt/gzippy-signing-key.asc apt-repo/gzippy-signing-key.asc
          cp scripts/install.sh apt-repo/install.sh

          # Stage for GitHub Pages (exclude reprepro internals)
          mkdir -p apt-publish
          cp -r apt-repo/dists apt-repo/pool apt-publish/
          cp apt-repo/gzippy-signing-key.asc apt-repo/install.sh apt-publish/
          touch apt-publish/.nojekyll

      - name: Deploy apt repo to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: apt-publish
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'chore: apt repo ${{ env.RELEASE_TAG }} [skip ci]'

      - name: Enable GitHub Pages (idempotent)
        run: |
          gh api --method POST "repos/$GITHUB_REPOSITORY/pages" \
            --field 'source[branch]=gh-pages' --field 'source[path]=/' 2>/dev/null \
          || gh api --method PUT "repos/$GITHUB_REPOSITORY/pages" \
            --field 'source[branch]=gh-pages' --field 'source[path]=/' 2>/dev/null \
          || echo "GitHub Pages already configured"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# =============================================================================
# Release: build binaries + .deb packages, publish everywhere.
# =============================================================================
# Triggered by:
#   - A push to main that modifies VERSION. VERSION is the source of truth.
#   - workflow_dispatch with an optional version override (re-run the same
#     version after a partial failure).
#
# Publishes to: GitHub release, Homebrew formula (this repo), apt repo
# (gh-pages), AUR (gzippy-bin + gzippy-replace-gzip), crates.io.
#
# Design: every step is idempotent. Re-running the workflow for a version
# that's already part-way published converges to a clean state. The SHA256s
# baked into the Homebrew formula and AUR PKGBUILDs always come from the
# **published release** — never from freshly-rebuilt artifacts — so re-runs
# can't drift them out of sync with what users actually download.
#
# Required secrets:
#   APT_SIGNING_KEY        GPG armored private key for the apt repo
#   AUR_SSH_KEY            SSH private key registered on aur.archlinux.org
#   CARGO_REGISTRY_TOKEN   crates.io API token (publish-new + publish-update)
#   MACOS_CERT_P12         Developer ID Application cert (base64-encoded)
#   MACOS_CERT_PASSWORD    Password for the cert
#   NOTARYTOOL_APPLE_ID    Apple ID for notarization
#   NOTARYTOOL_PASSWORD    App-specific password
#   NOTARYTOOL_TEAM_ID     Apple Developer team ID
# =============================================================================
name: Release

on:
  push:
    branches: [main]
    paths: [VERSION]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (e.g. 0.8.0) — defaults to VERSION file'
        required: false

permissions:
  contents: write
  pages: write
  id-token: write
  pull-requests: write

concurrency:
  group: release
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  # `.cargo/config.toml` pins `target-cpu=native` for local perf work. Shipped
  # release tarballs must run on any CPU of their target arch, not just the one
  # that happened to build them, so override to portable generic codegen here.
  # Runtime BMI2/AVX2 dispatch + ISA-L multibinary still select fast paths.
  # Must be RUSTFLAGS, not CARGO_BUILD_RUSTFLAGS: cargo ignores an empty
  # CARGO_BUILD_* var (falls back to config's build.rustflags), while a
  # defined-but-empty RUSTFLAGS clears it (verified on cargo 1.97).
  RUSTFLAGS: ""

jobs:
  # ---------------------------------------------------------------------------
  # Resolve the version once. All downstream jobs read this — no implicit
  # derivation from github.ref_name or build artifacts.
  # ---------------------------------------------------------------------------
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      tag:     ${{ steps.v.outputs.tag }}
    steps:
      - uses: actions/checkout@v6

      - id: v
        name: Resolve version
        run: |
          OVERRIDE="${{ github.event.inputs.version }}"
          FILE_VERSION=$(tr -d '[:space:]' < VERSION)
          if [ -n "$OVERRIDE" ]; then
            VERSION="${OVERRIDE#v}"
            if [ "$VERSION" != "$FILE_VERSION" ]; then
              echo "::error::workflow_dispatch version '$VERSION' does not match VERSION file '$FILE_VERSION'. Bump VERSION on main first, or omit the override."
              exit 1
            fi
          else
            VERSION="$FILE_VERSION"
          fi
          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([-+].*)?$'; then
            echo "::error::VERSION '$VERSION' is not valid semver"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION"    >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION (tag v$VERSION)"

      - name: Ensure draft release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.v.outputs.version }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists"
          else
            # Create as draft upfront so parallel build jobs don't race on
            # `gh release create`. Build jobs only `gh release upload --clobber`.
            gh release create "$TAG" --draft --title "$TAG" \
              --notes "Release $TAG (draft — assets uploading)"
            echo "Created draft release $TAG"
          fi

  # ---------------------------------------------------------------------------
  # Build native binaries for all 4 platforms.
  # Skips upload if the asset is already on the release (idempotent re-run).
  # ---------------------------------------------------------------------------
  build-binary:
    name: Binary / ${{ matrix.target }}
    needs: prepare
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # gzippy-native = the pure-Rust ParallelSM decode engine (no C-FFI in
          # the decode graph). x86_64-linux ALSO layers isal-compression (the
          # orthogonal ISA-L compress backend, T1 L0–L3); the two features
          # coexist — gzippy-native pulls pure-rust-inflate (decode), while
          # isal-compression pulls isal-rs (compress). The shipped binary must
          # decode single-member via ParallelSM, not libdeflate one-shot.
          - target: aarch64-apple-darwin
            runner: macos-latest
            apt_extras: ""
            features: --features gzippy-native
          - target: x86_64-apple-darwin
            runner: macos-latest
            apt_extras: ""
            features: --features gzippy-native
            cross_target: x86_64-apple-darwin
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            apt_extras: cmake
            features: --features gzippy-native
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            apt_extras: cmake nasm autoconf automake libtool
            features: --features gzippy-native,isal-compression
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
      TAG:     ${{ needs.prepare.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      # Skip the whole build only if BOTH the tarball and its .sha256 are
      # already on the release. A partial upload (tarball but no sha256, or
      # vice versa) must trigger a rebuild so the release can heal itself.
      - id: skip
        name: Skip if both tarball and .sha256 already on release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ASSETS=$(gh release view "$TAG" --json assets --jq '.assets[].name' 2>/dev/null || true)
          TARBALL="gzippy-${{ matrix.target }}.tar.gz"
          if echo "$ASSETS" | grep -qx "$TARBALL" \
             && echo "$ASSETS" | grep -qx "$TARBALL.sha256"; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Both $TARBALL and $TARBALL.sha256 present — skipping build"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: dtolnay/rust-toolchain@stable
        if: steps.skip.outputs.skip == 'false'
        with:
          targets: ${{ matrix.cross_target }}

      - uses: actions/cache@v5
        if: steps.skip.outputs.skip == 'false'
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: release-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Linux build deps
        if: steps.skip.outputs.skip == 'false' && runner.os == 'Linux' && matrix.apt_extras != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.apt_extras }}

      - name: Stamp version into Cargo.toml
        if: steps.skip.outputs.skip == 'false'
        run: |
          python3 -c "
          import re, os
          v = os.environ['VERSION']
          c = open('Cargo.toml').read()
          c = re.sub(r'^version = \"[^\"]+\"', f'version = \"{v}\"', c, count=1, flags=re.M)
          open('Cargo.toml', 'w').write(c)
          "

      - name: Build
        if: steps.skip.outputs.skip == 'false'
        run: cargo build --release --target ${{ matrix.target }} ${{ matrix.features }}

      - name: Sign and notarize (macOS only)
        if: steps.skip.outputs.skip == 'false' && runner.os == 'macOS'
        env:
          MACOS_CERT_P12:      ${{ secrets.MACOS_CERT_P12 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          NOTARYTOOL_APPLE_ID: ${{ secrets.NOTARYTOOL_APPLE_ID }}
          NOTARYTOOL_PASSWORD: ${{ secrets.NOTARYTOOL_PASSWORD }}
          NOTARYTOOL_TEAM_ID:  ${{ secrets.NOTARYTOOL_TEAM_ID }}
        run: |
          BINARY="target/${{ matrix.target }}/release/gzippy"
          echo "$MACOS_CERT_P12" | base64 --decode > /tmp/cert.p12
          security create-keychain -p "ci" ci.keychain
          security list-keychains -d user -s ci.keychain $(security list-keychains -d user | tr -d '"' | xargs)
          security set-keychain-settings -lut 21600 ci.keychain
          security unlock-keychain -p "ci" ci.keychain
          security import /tmp/cert.p12 -k ci.keychain -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "ci" ci.keychain
          rm /tmp/cert.p12

          codesign --sign "Developer ID Application: Jack Danger (LWLMGDKSM9)" \
                   --options runtime --timestamp --force "$BINARY"
          codesign --verify --strict "$BINARY"

          ditto -c -k --keepParent "$BINARY" /tmp/gzippy-notarize.zip
          xcrun notarytool submit /tmp/gzippy-notarize.zip \
            --apple-id  "$NOTARYTOOL_APPLE_ID" \
            --password  "$NOTARYTOOL_PASSWORD" \
            --team-id   "$NOTARYTOOL_TEAM_ID" \
            --wait
          rm /tmp/gzippy-notarize.zip

      - name: Package tarball + SHA256
        if: steps.skip.outputs.skip == 'false'
        run: |
          TARBALL="gzippy-${{ matrix.target }}.tar.gz"
          tar -czf "$TARBALL" -C target/${{ matrix.target }}/release gzippy
          shasum -a 256 "$TARBALL" | awk '{print $1}' > "$TARBALL.sha256"

      - name: Upload to release
        if: steps.skip.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TARBALL="gzippy-${{ matrix.target }}.tar.gz"
          # prepare job created the draft; --clobber overwrites stale assets
          # cleanly on re-runs.
          gh release upload "$TAG" "$TARBALL" "$TARBALL.sha256" --clobber

  # ---------------------------------------------------------------------------
  # Build Debian packages for amd64 + arm64.
  # ---------------------------------------------------------------------------
  build-deb:
    name: Deb / ${{ matrix.arch }}
    needs: prepare
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
      TAG:     ${{ needs.prepare.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      # Skip only if every package this arch produces is present. amd64 also
      # produces the arch-independent `gzippy-replace-gzip_*_all.deb`; arm64
      # produces a duplicate of that which we don't strictly need (release
      # `--clobber` handles the overlap).
      - id: skip
        name: Skip if debs already on release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ASSETS=$(gh release view "$TAG" --json assets --jq '.assets[].name' 2>/dev/null || true)
          MAIN="gzippy_${VERSION}-1_${{ matrix.arch }}.deb"
          REPLACE="gzippy-replace-gzip_${VERSION}-1_all.deb"
          skip=true
          echo "$ASSETS" | grep -qx "$MAIN"    || skip=false
          # amd64 is the canonical source of the arch-independent package
          if [ "${{ matrix.arch }}" = "amd64" ]; then
            echo "$ASSETS" | grep -qx "$REPLACE" || skip=false
          fi
          echo "skip=$skip" >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@stable
        if: steps.skip.outputs.skip == 'false'

      - name: Install build deps
        if: steps.skip.outputs.skip == 'false'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            debhelper devscripts build-essential \
            zlib1g-dev cmake nasm autoconf automake libtool

      - name: Stamp version into debian/changelog
        if: steps.skip.outputs.skip == 'false'
        run: sed -i "1s/gzippy ([^)]*)/gzippy (${VERSION}-1)/" debian/changelog

      - name: Build .deb
        if: steps.skip.outputs.skip == 'false'
        run: dpkg-buildpackage -us -uc -b -d

      - name: Smoke test installation
        if: steps.skip.outputs.skip == 'false'
        run: |
          sudo dpkg -i ../gzippy_*.deb
          echo "Hello gzippy" | gzippy -c | gzippy -d
          [ "$(readlink /usr/bin/gzip)" = "gzippy" ] || (echo "gzip not diverted"; exit 1)

      - name: Upload .debs to release
        if: steps.skip.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp ../*.deb ./
          # Upload every .deb dpkg-buildpackage produced — covers both the
          # per-arch package and the arch-independent gzippy-replace-gzip.
          gh release upload "$TAG" *.deb --clobber

  # ---------------------------------------------------------------------------
  # Publish everywhere. Single linear job — each step is idempotent and reads
  # SHA256s from the published release (never from freshly-rebuilt artifacts)
  # so the formula, AUR PKGBUILD, and apt repo all reference the bytes users
  # actually download.
  # ---------------------------------------------------------------------------
  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: [prepare, build-binary, build-deb]
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
      TAG:     ${{ needs.prepare.outputs.tag }}
      RELEASE_BASE: https://github.com/JackDanger/gzippy/releases/download/${{ needs.prepare.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          submodules: true

      # ---- Ensure tag exists at main HEAD -----------------------------------
      - name: Ensure tag exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already on origin"
          else
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
          fi

      # ---- Finalize release (flip from draft → published) -------------------
      - name: Finalize release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Flip the draft (created by `prepare`) to published. Replace the
          # placeholder "draft — assets uploading" notes with auto-generated
          # ones (commit list since the previous tag) so the public release
          # page reads cleanly.
          if gh release view "$TAG" --json isDraft --jq '.isDraft' | grep -qx true; then
            gh release edit "$TAG" --draft=false --verify-tag
            # `--generate-notes` only works on `create`; for an existing release,
            # the supported pattern is delete-and-recreate notes via the API.
            # Simpler: use `gh release edit --notes-file` after generating.
            NOTES=$(gh api "repos/$GITHUB_REPOSITORY/releases/generate-notes" \
              -f tag_name="$TAG" --jq '.body')
            gh release edit "$TAG" --notes "$NOTES"
            echo "Release $TAG finalized with auto-generated notes"
          else
            echo "Release $TAG already published"
          fi

      # ---- Read SHA256s from the published release --------------------------
      # Single source of truth. These are the bytes users actually download —
      # so anything we stamp downstream (formula, PKGBUILD) is automatically
      # consistent with reality.
      - id: shas
        name: Fetch SHA256s from release
        shell: bash
        run: |
          # pipefail so curl failure isn't silently swallowed by awk producing
          # an empty SHA that would then be stamped into the formula.
          set -euo pipefail
          fetch_sha() {
            local target="$1"
            local sha
            sha=$(curl -fsSL --retry 5 --retry-delay 3 \
              "${RELEASE_BASE}/gzippy-${target}.tar.gz.sha256" | awk '{print $1}')
            if ! [[ "$sha" =~ ^[0-9a-f]{64}$ ]]; then
              echo "::error::SHA256 for $target is missing or malformed: '$sha'"
              return 1
            fi
            echo "$sha"
          }
          {
            echo "aarch64_apple_darwin=$(fetch_sha aarch64-apple-darwin)"
            echo "x86_64_apple_darwin=$(fetch_sha x86_64-apple-darwin)"
            echo "aarch64_unknown_linux_gnu=$(fetch_sha aarch64-unknown-linux-gnu)"
            echo "x86_64_unknown_linux_gnu=$(fetch_sha x86_64-unknown-linux-gnu)"
          } >> "$GITHUB_OUTPUT"

      # ---- Update Formula/gzippy.rb + Cargo.toml in workspace ---------------
      - name: Stamp formula and Cargo.toml
        run: |
          python3 - <<PYEOF
          import re
          version = "${{ env.VERSION }}"
          shas = {
              'AARCH64_APPLE_DARWIN':      "${{ steps.shas.outputs.aarch64_apple_darwin }}",
              'X86_64_APPLE_DARWIN':       "${{ steps.shas.outputs.x86_64_apple_darwin }}",
              'AARCH64_UNKNOWN_LINUX_GNU': "${{ steps.shas.outputs.aarch64_unknown_linux_gnu }}",
              'X86_64_UNKNOWN_LINUX_GNU':  "${{ steps.shas.outputs.x86_64_unknown_linux_gnu }}",
          }
          formula = open('Formula/gzippy.rb').read()
          for key, sha in shas.items():
              formula = re.sub(rf'sha256 "[0-9a-f]+" # {key}',
                               f'sha256 "{sha}" # {key}', formula)
          open('Formula/gzippy.rb', 'w').write(formula)

          cargo = open('Cargo.toml').read()
          cargo = re.sub(r'^version = "[^"]+"', f'version = "{version}"', cargo, count=1, flags=re.M)
          open('Cargo.toml', 'w').write(cargo)
          PYEOF

      # ---- Sync formula via PR (idempotent + zombie-PR-free) ----------------
      - name: Sync formula update via PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="release/formula-${VERSION}"

          # Close stale PRs FIRST — even if main already matches and we're
          # about to no-op below, we still want to clear any zombie PRs that
          # an earlier failed run may have left open. The v0.7.1 release left
          # PR #105 stuck open this way.
          STALE=$(gh pr list --head "$BRANCH" --base main --state open --json number --jq '.[].number')
          for n in $STALE; do
            echo "Closing stale formula PR #$n"
            gh pr close "$n" --comment "Superseded by current release run."
          done

          git add Formula/gzippy.rb Cargo.toml
          if git diff --cached --quiet; then
            echo "Formula and Cargo.toml already at v${VERSION} — no PR needed"
            exit 0
          fi

          git checkout -B "$BRANCH"
          git commit -m "chore: update formula and Cargo.toml to v${VERSION}"
          git push --force-with-lease origin "$BRANCH"

          PR_URL=$(gh pr create \
            --title "chore: update formula to v${VERSION}" \
            --body  "Automated formula + Cargo.toml update for v${VERSION}. SHA256s come from the published release at ${RELEASE_BASE}." \
            --base  main --head "$BRANCH")
          PR_NUMBER="${PR_URL##*/}"
          echo "Opened PR #${PR_NUMBER}: ${PR_URL}"

          # Enable auto-merge — GitHub fires the merge once CI passes.
          gh pr merge "$PR_NUMBER" --squash --auto

      # ---- Publish to crates.io (idempotent + retry) ------------------------
      # The formula-sync step above merges its PR with `--auto`, which queues
      # the merge for after checks — origin/main may NOT have the bumped
      # Cargo.toml when this step runs. So we stamp the version in-place from
      # VERSION (the env var, invariant across the run) and ignore main.
      - uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          is_published() {
            curl -fsSL "https://crates.io/api/v1/crates/gzippy/versions" \
              | python3 -c "import json,sys; print('\n'.join(v['num'] for v in json.load(sys.stdin)['versions']))" \
              | grep -qx "$VERSION"
          }

          if is_published; then
            echo "gzippy v${VERSION} already on crates.io — skipping"
            exit 0
          fi

          # Stamp the version directly into the workspace Cargo.toml. This is
          # independent of whether the formula-update PR has merged yet —
          # critical because `gh pr merge --auto` is async and main may still
          # have the old version.
          python3 -c "
          import re, os
          v = os.environ['VERSION']
          c = open('Cargo.toml').read()
          c = re.sub(r'^version = \"[^\"]+\"', f'version = \"{v}\"', c, count=1, flags=re.M)
          open('Cargo.toml', 'w').write(c)
          "

          sudo apt-get update && sudo apt-get install -y cmake

          # Retry on transient network errors (HTTP/2 STREAM_CLOSED observed
          # against crates.io). Between retries, re-check the API: the server
          # may have accepted the upload even though the client saw an error,
          # which would otherwise make every retry fail with "already exists".
          for attempt in 1 2 3; do
            if cargo publish --allow-dirty --no-verify --token "$CARGO_REGISTRY_TOKEN"; then
              echo "Published gzippy v${VERSION} to crates.io (attempt $attempt)"
              exit 0
            fi
            echo "cargo publish attempt $attempt failed."
            if is_published; then
              echo "But crates.io now has v${VERSION} — server accepted despite client error. OK."
              exit 0
            fi
            echo "Retrying in 15s..."
            sleep 15
          done
          echo "::error::cargo publish failed after 3 attempts and v${VERSION} is not on crates.io"
          exit 1

      # ---- Publish AUR packages --------------------------------------------
      - name: Set up SSH for AUR
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$AUR_SSH_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          cat >> ~/.ssh/config <<'EOF'
          Host aur.archlinux.org
            IdentityFile ~/.ssh/aur
            User aur
          EOF
          chmod 600 ~/.ssh/config
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts
          if ! ssh-keygen -y -f ~/.ssh/aur > /dev/null 2>&1; then
            echo "::error::AUR_SSH_KEY is not a valid SSH private key. See workflow header."
            exit 1
          fi

      - name: Push AUR packages
        run: |
          X86=${{ steps.shas.outputs.x86_64_unknown_linux_gnu }}
          ARM=${{ steps.shas.outputs.aarch64_unknown_linux_gnu }}
          bash scripts/update-aur.sh "$VERSION" "$X86" "$ARM"

      - name: Smoke-test PKGBUILD (Docker)
        run: |
          X86=${{ steps.shas.outputs.x86_64_unknown_linux_gnu }}
          ARM=${{ steps.shas.outputs.aarch64_unknown_linux_gnu }}

          mkdir -p /tmp/pkgbuild-dir
          cp packaging/aur/gzippy-bin/PKGBUILD /tmp/pkgbuild-dir/PKGBUILD
          sed -i "s/pkgver=.*/pkgver=$VERSION/"                  /tmp/pkgbuild-dir/PKGBUILD
          sed -i "s|/vVERSION/|/v$VERSION/|g"                    /tmp/pkgbuild-dir/PKGBUILD
          sed -i "s/sha256sums_x86_64=.*/sha256sums_x86_64=('$X86')/"   /tmp/pkgbuild-dir/PKGBUILD
          sed -i "s/sha256sums_aarch64=.*/sha256sums_aarch64=('$ARM')/" /tmp/pkgbuild-dir/PKGBUILD

          docker run --rm -v /tmp/pkgbuild-dir:/pkg -w /pkg archlinux:latest bash -c "
            pacman -Sy --noconfirm base-devel 2>/dev/null
            useradd -m builder
            chown -R builder /pkg
            su builder -c 'makepkg --verifysource --nodeps'
          "

      # ---- Build + deploy apt repo to gh-pages ------------------------------
      - name: Install reprepro
        run: sudo apt-get install -y reprepro

      - name: Import apt signing key
        env:
          APT_SIGNING_KEY: ${{ secrets.APT_SIGNING_KEY }}
        run: |
          echo "$APT_SIGNING_KEY" | gpg --batch --import
          KEY_FPR=$(gpg --list-keys --with-colons releases@jackdanger.com \
            | grep '^fpr' | head -1 | cut -d: -f10)
          echo "${KEY_FPR}:6:" | gpg --import-ownertrust
          echo "KEY_FPR=$KEY_FPR" >> "$GITHUB_ENV"

      - name: Download .debs from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dist
          gh release download "$TAG" --pattern '*.deb' --dir dist

      - name: Build apt repo
        run: |
          mkdir -p apt-repo/conf
          cat > apt-repo/conf/distributions <<EOF
          Origin: gzippy
          Label: gzippy
          Codename: stable
          Architectures: amd64 arm64
          Components: main
          Description: gzippy apt repository
          SignWith: ${KEY_FPR}
          EOF

          for deb in dist/*.deb; do
            reprepro -b apt-repo includedeb stable "$deb"
          done

          cp packaging/apt/gzippy-signing-key.asc apt-repo/gzippy-signing-key.asc
          cp scripts/install.sh apt-repo/install.sh

          mkdir -p apt-publish
          cp -r apt-repo/dists apt-repo/pool apt-publish/
          cp apt-repo/gzippy-signing-key.asc apt-repo/install.sh apt-publish/
          touch apt-publish/.nojekyll

      - name: Deploy apt repo to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: apt-publish
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'chore: apt repo ${{ env.TAG }} [skip ci]'

      - name: Enable GitHub Pages (idempotent)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api --method POST "repos/$GITHUB_REPOSITORY/pages" \
            --field 'source[branch]=gh-pages' --field 'source[path]=/' 2>/dev/null \
          || gh api --method PUT "repos/$GITHUB_REPOSITORY/pages" \
            --field 'source[branch]=gh-pages' --field 'source[path]=/' 2>/dev/null \
          || echo "GitHub Pages already configured"

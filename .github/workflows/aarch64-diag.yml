name: aarch64 decode diagnostic

# Lean, on-demand aarch64 loss-map: gz vs {rapidgzip, libdeflate, pigz, igzip?}
# on logs + silesia at T1 and Tmax, interleaved + /dev/null sink + CV.
# Closes the owed aarch64-vs-rapidgzip / aarch64-vs-libdeflate gap.

on:
  workflow_dispatch: {}

jobs:
  arm64-decompress:
    name: aarch64 decompress loss-map
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install deps + competitors
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake nasm zlib1g-dev autoconf automake libtool pigz libdeflate-tools python3-pip xz-utils
          # rapidgzip via pip (aarch64 wheel) — guarantees the owed comparator
          pip install --break-system-packages rapidgzip || pip install --user --break-system-packages rapidgzip
          echo "PATH=$PATH:$HOME/.local/bin" >> $GITHUB_ENV

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build gzippy (gzippy-native, ParallelSM) + Gate-4
        run: |
          cargo build --release --features gzippy-native
          printf 'gate4 production-path assertion fixture\n%.0s' {1..4096} \
            | ./target/release/gzippy -c > /tmp/gate4-sm.gz
          DBG=$(GZIPPY_DEBUG=1 ./target/release/gzippy -d -c /tmp/gate4-sm.gz 2>&1 >/dev/null)
          echo "$DBG"
          echo "$DBG" | grep -q 'path=ParallelSM' || { echo "::error::Gate-4 FAILED: not ParallelSM"; exit 1; }
          echo "Gate-4 OK: ParallelSM"
          ./target/release/gzippy --version

      - name: Build pigz
        run: make -C vendor/pigz

      - name: Package binaries
        run: |
          mkdir -p bin
          cp target/release/gzippy bin/
          cp vendor/pigz/pigz vendor/pigz/unpigz bin/
          cp "$(command -v libdeflate-gunzip)" bin/ 2>/dev/null || echo "libdeflate-gunzip missing"
          RG="$(command -v rapidgzip || true)"; [ -n "$RG" ] && cp "$RG" bin/ || echo "rapidgzip missing"
          # igzip on aarch64 is best-effort
          (cd vendor/isa-l && rm -rf build && mkdir -p build && cd build && cmake .. -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF && make -j$(nproc) igzip) || echo "igzip build failed"
          cp vendor/isa-l/build/igzip bin/ 2>/dev/null || echo "igzip not available"
          chmod +x bin/* || true
          echo "=== bin contents ==="; ls -la bin/
          echo "=== arch/nproc ==="; uname -m; nproc

      - name: Prepare data (offline cache)
        run: make bench-data

      - name: Decompress loss-map (interleaved, /dev/null sink, CV)
        run: |
          mkdir -p results
          NP=$(nproc)
          for T in 1 "$NP"; do
            python3 scripts/benchmark_decompression.py \
              --binaries ./bin \
              --compressed-file benchmark_data/logs.txt.gz \
              --original-file benchmark_data/logs.txt \
              --threads $T --archive-type logs-gzip \
              --min-trials 15 --max-trials 40 \
              --output results/logs-t$T.json
            python3 scripts/benchmark_decompression.py \
              --binaries ./bin \
              --compressed-file benchmark_data/silesia-large.gz \
              --original-file benchmark_data/silesia-large.bin \
              --threads $T --archive-type silesia-gzip \
              --min-trials 15 --max-trials 40 \
              --output results/silesia-t$T.json
          done

      - name: Render ratio ledger
        run: python3 scripts/headmap_render.py results

      - uses: actions/upload-artifact@v7
        with:
          name: arm64-headmap-results
          path: results/
          retention-days: 7
